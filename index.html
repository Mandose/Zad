<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>zadan</title>
  <style>
    @font-face {
      font-family: 'MashinTahrir';
      src: url('Far_MashinTahrir.ttf') format('truetype');
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'MashinTahrir', 'Courier New', monospace;
      background: #020202;
      transition: background 0.8s ease;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      min-height: 100vh;
      padding: 80px 24px 44px;
      text-align: center;
    }
    body.dimmed { background: #000000; }

    /* TOP */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .subtitle {
      font-size: 15px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: 0.06em;
    }
    h1 {
      font-size: 42px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    /* CIRCLE */
    .circle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .circle-btn {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.5s;
    }
    .circle-btn.active {
      box-shadow: 0 0 40px rgba(181, 42, 30, 0.35);
    }

    .inner-dot {
      width: 0;
      height: 0;
      border-radius: 50%;
      background: #b52a1e;
      transition: width 0.4s ease, height 0.4s ease;
    }
    .circle-btn.active .inner-dot {
      width: 43px;
      height: 43px;
    }

    /* MONITOR */
    .monitor-row {
      display: flex;
      align-items: center;
      gap: 8px;
      direction: rtl;
      opacity: 0;
      transition: opacity 0.6s;
    }
    .monitor-row.visible { opacity: 1; }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }
    .monitor-text {
      font-size: 11px;
      font-weight: 300;
      color: #3a3a3a;
      letter-spacing: 0.06em;
    }

    /* BOTTOM */
    .bottom {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      max-width: 320px;
      line-height: 1.9;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="subtitle">هر وقت زدن</div>
    <h1>بهم خبر بده!</h1>
  </div>

  <div class="circle-wrap">
    <button class="circle-btn" id="circleBtn" onclick="toggleNotif()">
      <div class="inner-dot"></div>
    </button>
    <div class="monitor-row" id="monitorRow">
      <span class="dot"></span>
      <span class="monitor-text">در حال پایش منابع خبری رسمی</span>
    </div>
  </div>

  <p class="bottom">
    شما با فشردن دایره سفید، با خبر رسمی آغاز جنگ ایران–امریکا،<br/>
    تنها یک بار نوتیفیکیشن دریافت می‌کنید.<br/>
    «زدن»
  </p>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    let isActive = false;

    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "c5866cf0-d4fd-461b-ac78-1559a36bfa9b",
        allowLocalhostAsSecureOrigin: true,
      });
      if (OneSignal.Notifications.permission) setActive(true);
    });

    function setActive(val) {
      isActive = val;
      const btn = document.getElementById('circleBtn');
      const monitor = document.getElementById('monitorRow');
      if (val) {
        btn.classList.add('active');
        monitor.classList.add('visible');
        document.body.classList.add('dimmed');
      } else {
        btn.classList.remove('active');
        monitor.classList.remove('visible');
        document.body.classList.remove('dimmed');
      }
    }

    async function toggleNotif() {
      if (!isActive) {
        setActive(true);
        OneSignalDeferred.push(async function(OneSignal) {
          try { await OneSignal.Notifications.requestPermission(); } catch(e) {}
        });
      } else {
        setActive(false);
      }
    }
  </script>
</body>
</html>
